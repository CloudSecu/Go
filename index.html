<script>

const encryptedLinks = {

    "O9B22": "QkP9NGb53fUhbywuhc6pMQxHYQzCtsBSOafKvaGCdeNLjlweeG+7JxSh4SXF9TBSsWDqMU/AB6lbYyHiZte2+CpF+JlFItLcZL93TDZL6ayvV7VjF70WC6llB6PfhnYLAjFAaYcTA2czhpl0jsHhJ6QfY3MQpGPe1w==",
    "0G8CZ": "ZZ7IY7awepXmL8LG56jV1VD+b6HjhyRySsHabBgxkm8KmCIDs4TK3ZeA0/BA+CrSZGKXewBHGSqI025pXAYOY7noRCWPaJzebD/JMCnuWHPnRSdbnLrsGCXUB9JeK52jBI8Ky7q2gj+rxpMe8CiI0sQyxuqtkRpNeLI="
};

async function decrypt() {

    const id = location.hash.substring(1);
    if (!encryptedLinks[id]) {
        alert("Lien invalide");
        return;
    }

    const encryptedData = encryptedLinks[id];
    const password = document.getElementById("password").value;

    try {

        const data = Uint8Array.from(atob(encryptedData), c => c.charCodeAt(0));
        const salt = data.slice(0, 16);
        const iv = data.slice(16, 28);
        const encrypted = data.slice(28);

        const encoder = new TextEncoder();

        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            encoder.encode(password),
            "PBKDF2",
            false,
            ["deriveKey"]
        );

        const key = await crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: salt,
                iterations: 250000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"]
        );

        const decrypted = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encrypted
        );

        const payload = JSON.parse(new TextDecoder().decode(decrypted));

        // 🔥 On charge le contenu de la page
        const response = await fetch(payload.url);
        const html = await response.text();

        // 🔥 On remplace complètement le document
        document.open();
        document.write(html);
        document.close();

    } catch (e) {
        alert("Mot de passe incorrect");
    }
}

</script>
